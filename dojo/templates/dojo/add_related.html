{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="">
    <meta name="author" content="">

    <title>DefectDojo - {{ name }}</title>


    <!-- Tailwind CSS -->
    <link rel="stylesheet" href="{% static "dojo/css/tailwind-out.css" %}">

    <!-- Font Awesome 6 -->
    <link href="{% static "fontawesomefree/css/fontawesome.min.css" %}" rel="stylesheet" type="text/css">
    <link href="{% static "fontawesomefree/css/brands.min.css" %}" rel="stylesheet" type="text/css">
    <link href="{% static "fontawesomefree/css/solid.min.css" %}" rel="stylesheet" type="text/css">

<link rel="stylesheet" href="{% static "jquery-ui/dist/themes/base/jquery-ui.min.css" %}">
    <link rel="shortcut icon" href="{% static "dojo/img/favicon.png" %}"/>
    <link rel="stylesheet" href="{% static "fullcalendar/dist/fullcalendar.min.css" %}">
    <link rel="stylesheet" href="{% static "chosen-bootstrap/chosen.bootstrap.min.css" %}">
    <link rel="stylesheet" href="{% static "dojo/css/dojo.css" %}">
    <link rel="stylesheet" href="{% static "dojo/css/tailwind-out.css" %}">
</head>
<body class="popup">
<!-- Page Content -->
<div class="container">
    <div class="row">
        <div class="col-lg-12">
            <form method="post" class="">
                <legend>{{ name }}</legend>
                {% csrf_token %}
                {% include "dojo/form_fields.html" with form=form %}
                <div class="form-group">
                    <div class="col-sm-offset-2 col-sm-10">
                        <input class="btn btn-primary" type="submit" name="add_endpoint" value="Submit"/>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
<!-- /.container -->

<!-- /#wrapper -->

<!-- jQuery -->
<script src="{% static "jquery/dist/jquery.min.js" %}"></script>
<!--  jQuery UI -->
<script src="{% static "jquery-ui/dist/jquery-ui.min.js" %}"></script>
<!-- Bootstrap JS removed — shims in index.js -->
<!-- Calendar JavaScript -->
<script src="{% static "moment/min/moment.min.js" %}"></script>
<script src="{% static "fullcalendar/dist/fullcalendar.min.js" %}"></script>
<!-- our JS -->
<script type="application/javascript" src="{% static "chosen-js/chosen.jquery.min.js" %}"></script>

<script type="text/javascript" src="{% static "admin/js/jquery.init.js"%}"></script>
<script type="application/javascript" src="{% static "admin/js/admin/RelatedObjectLookups.js" %}"></script>
<script type="application/javascript">
    $ = django.jQuery;
</script>
<script src="{% static "dojo/js/index.js" %}"></script>
<script type="application/javascript">
    $(function () {
        var endpoints = '';
        $(window.opener.document.getElementById('id_endpoints')).children('option').each(function () {
            endpoints += $(this).text();
            endpoints += "\n";
        });
        $('textarea#id_endpoint').text(endpoints);
    });
</script>
</body>

</html>
