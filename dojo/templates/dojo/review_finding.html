{% extends "base.html" %}
{% load event_tags %}
{% load static %}

{% block content %}
    {{ block.super }}
    <h3> Mark Finding for Review</h3>
    <h4>{{ finding.title }}</h4>
    <p>Please provide a reason why this finding needs to be reviewed.</p>
    <form class="" action="{% url 'request_finding_review' finding.id %}" method="post">
        {% csrf_token %}
        {% include "dojo/form_fields.html" with form=form %}
        <div class="form-group">
            <div class="col-sm-offset-2 col-sm-10">
                <input class="btn btn-primary" name="submit" type="submit" value="Mark for Review"/>
            </div>
        </div>
    </form>
{% endblock %}
