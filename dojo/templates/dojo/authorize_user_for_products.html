{% extends "base.html" %}
{% load i18n %}
{% block content %}
    {{ block.super }}
    <h3>{{ name }} - {{ user.get_full_name }} ({{ user.username }})</h3>
    <form class="" action="{% url 'authorize_user_for_products' user.id %}" method="post">{% csrf_token %}
        {% include "dojo/form_fields.html" with form=form %}
        <div class="form-group">
            <div class="col-sm-offset-2 col-sm-10">
                <input class="btn btn-primary" type="submit" value="{% trans "Submit" %}"/>
            </div>
        </div>
    </form>
{% endblock %}
