name: Performance Tests

on:
  workflow_call:

jobs:
  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    needs: []
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: true

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set-platform
        run: |
          echo "PLATFORM=linux-amd64" >> $GITHUB_ENV

      - name: Load images from artifacts
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          path: built-docker-image
          pattern: built-docker-image-django-alpine-linux-amd64
          merge-multiple: true

      - name: Load docker images
        timeout-minutes: 10
        run: |
          docker load -i built-docker-image/django-alpine-linux-amd64_img
          docker images

      - name: Set unit-test mode
        run: docker/setEnv.sh unit_tests_cicd

      - name: Start Postgres and webhook.endpoint
        run: docker compose up --no-deps -d postgres webhook.endpoint

      - name: Start uwsgi (idle)
        timeout-minutes: 5
        run: |
          docker compose -f docker-compose.yml -f docker-compose.override.yml \
            -f docker/docker-compose.override.performance_tests_cicd.yml \
            up -d --no-deps uwsgi
        env:
          DJANGO_VERSION: alpine

      - name: Run performance tests (auto-update counts)
        timeout-minutes: 60
        run: python3 scripts/update_performance_test_counts.py

        # this commit will not trigger a new build/cicd run
      - name: Commit updated counts if changed
        run: |
          if ! git diff --quiet unittests/test_importers_performance.py; then
            git add unittests/test_importers_performance.py
            git commit -m "chore: update performance test counts [skip ci]"
            git push
            gh pr comment ${{ github.event.pull_request.number }} \
              --body "Performance test counts were out of date and have been auto-updated. Please review the changes in the latest commit."
          else
            echo "Performance test counts are up to date."
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Logs
        if: failure()
        run: docker compose logs --tail="2500" uwsgi

      - name: Shutdown
        if: always()
        run: docker compose down
