name: Release Drafter

on:
  workflow_dispatch:
    inputs:
      version:
        description: |
          The version to be associated with the GitHub release that's created or updated.
          This will override any version calculated by the release-drafter.
        required: true
  workflow_call:
    inputs:
      version:
        type: string
        description: |
          The version to be associated with the GitHub release that's created or updated.
          This will override any version calculated by the release-drafter.
        required: true

jobs:
  # Update the notes in the release drafter first
  # If the following jobs fail, then we will at least have some release notes present
  update_release_draft:
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.create_release.outputs.tag_name }}
    steps:
      - name: Create Release
        id: create_release
        uses: release-drafter/release-drafter@eada3c96a64734dd381cfbda23511034e328ddb0 # v7.6.0
        with:
          version: ${{ inputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  # Generate the OAS schemas in another workflow
  oas-fetch:
    needs: update_release_draft
    uses: ./.github/workflows/fetch-oas.yml
    with:
      version: ${{ inputs.version }}
    secrets: inherit
  # Upload the OAS schemas to the release object
  add-oas-to-release:
    needs:
      - update_release_draft
      - oas-fetch
    runs-on: ubuntu-latest
    steps:
      - name: Load OAS files from artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: oas-*

      - name: Upload OAS schemas to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.update_release_draft.outputs.tag_name }}" \
            ./oas-yaml/oas.yaml ./oas-json/oas.json \
            --clobber --repo "${{ github.repository }}"


